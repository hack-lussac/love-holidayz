<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery | Love Holidayz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="container header-inner">
    <div class="brand">Love <span>Holidayz</span></div>
    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="packages.html">Packages</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<!-- GALLERY HERO -->
<section class="section white">
  <div class="container">
    <h1 style="font-size:36px;">Travel Gallery</h1>
    <p style="color:#6B7280; margin-top:8px;">
      Beautiful moments from our favourite destinations
    </p>
  </div>
</section>

<!-- GALLERY GRID -->
<section class="gallery-section">
  <div class="container gallery-grid">

    <div class="gallery-card">
      <img src="images/goa.jpg" alt="Goa Beach">
      <div class="gallery-caption">Goa Honeymoon</div>
    </div>

    <div class="gallery-card">
      <img src="images/manali.jpeg" alt="Manali Mountains">
      <div class="gallery-caption">Manali Adventure</div>
    </div>

    <div class="gallery-card">
      <img src="images/kashmir.jpg" alt="Kashmir Valley">
      <div class="gallery-caption">Kashmir Paradise</div>
    </div>

    <div class="gallery-card">
      <img src="images/dubai.webp" alt="Dubai City">
      <div class="gallery-caption">Dubai Luxury</div>
    </div>

    <div class="gallery-card">
      <img src="images/banner.jpg" alt="Romantic Holiday">
      <div class="gallery-caption">Romantic Getaway</div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  © Love Holidayz
</footer>

</body>
</html>
